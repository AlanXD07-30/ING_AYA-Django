{% extends "SecretariaOpciones/panel_secretaria.html" %}
{% block content %}
  <section class="seccion-citas">
    <h2 class="titulo-seccion">Citas</h2>

    <div class="controles">
      <label for="filtroEstado">Estado:</label>
      <select id="filtroEstado" onchange="applyFilters()">
        <option value="todos">Todos</option>
        <option value="PENDIENTE">Pendiente</option>
        <option value="CONFIRMADA">Confirmada</option>
        <option value="CANCELADA">Cancelada</option>
      </select>

      <label for="date_from">Desde:</label>
      <input type="date" id="date_from">

      <label for="date_to">Hasta:</label>
      <input type="date" id="date_to">

      <div class="acciones">
        <button class="btn" onclick="submitAllReport()">Imprimir: Todos</button>
        <button class="btn" onclick="submitFilterReport()">Imprimir: Filtradas</button>
        <button class="btn btn-outline" onclick="submitSelectedReport()">Imprimir: Seleccionadas</button>
        <a class="btn" href="{{ url_for('secretaria_agendar_cita') }}">Agendar Cita</a>
      </div>
    </div>

    <div class="tabla-contenedor">
      <table class="tabla-citas">
        <thead>
          <tr>
            <th style="width:40px;"><input type="checkbox" onclick="document.querySelectorAll('.row-checkbox').forEach(cb=>cb.checked=this.checked)"></th>
            <th>ID</th>
            <th>Fecha / Hora</th>
            <th>Cliente</th>
            <th>Asunto</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          {% for c in citas %}
          <tr>
            <td><input class="row-checkbox" type="checkbox" value="{{ c[0] }}"></td>
            <td>{{ c[0] }}</td>
            <td>{{ c[1] }}</td>
            <td>{{ c[2] }}</td>
            <td>{{ c[3] }}</td>
            <td>{{ c[4] }}</td>
          </tr>
          {% else %}
          <tr>
            <td colspan="6">No hay citas registradas.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <form id="reportForm" action="{{ url_for('secretaria_citas_reporte') }}" method="get" style="display:none;">
      <input type="hidden" name="mode" value="">
      <input type="hidden" name="selected_ids" value="">
      <input type="hidden" name="estado" value="">
      <input type="hidden" name="date_from" value="">
      <input type="hidden" name="date_to" value="">
    </form>
  </section>

  <script>
    function applyFilters(){
      const estado = document.getElementById('filtroEstado').value.toLowerCase();
      const from = document.getElementById('date_from').value;
      const to = document.getElementById('date_to').value;
      const rows = document.querySelectorAll('.tabla-citas tbody tr');
      rows.forEach(r=>{
        if (r.children.length < 6) return;
        const estadoCell = r.children[5].innerText.toLowerCase();
        const fechaCell = r.children[2].innerText;
        let show = true;
        if (estado !== 'todos' && estadoCell.indexOf(estado) === -1) show = false;
        if (from && fechaCell < from) show = false;
        if (to && fechaCell > to) show = false;
        r.style.display = show ? '' : 'none';
      });
    }

    function submitAllReport(){
      const f = document.getElementById('reportForm');
      f.mode.value = 'all';
      f.selected_ids.value = '';
      f.estado.value = document.getElementById('filtroEstado').value || '';
      f.date_from.value = document.getElementById('date_from').value || '';
      f.date_to.value = document.getElementById('date_to').value || '';
      f.submit();
    }

    function submitFilterReport(){
      const f = document.getElementById('reportForm');
      f.mode.value = 'filter';
      f.selected_ids.value = '';
      f.estado.value = document.getElementById('filtroEstado').value || '';
      f.date_from.value = document.getElementById('date_from').value || '';
      f.date_to.value = document.getElementById('date_to').value || '';
      f.submit();
    }

    function submitSelectedReport(){
      const checked = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb=>cb.value).join(',');
      if (!checked) { alert('No hay citas seleccionadas'); return; }
      const f = document.getElementById('reportForm');
      f.mode.value = 'selected';
      f.selected_ids.value = checked;
      f.estado.value = document.getElementById('filtroEstado').value || '';
      f.date_from.value = document.getElementById('date_from').value || '';
      f.date_to.value = document.getElementById('date_to').value || '';
      f.submit();
    }
  </script>
{% endblock %}
