<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Secretaria - Ing Aya</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='secretaria.css') }}">
</head>
<body>
  <div class="waves"></div>

  <!-- Sidebar: solo las opciones disponibles -->
  <div class="sidebar">
    <a href="http://127.0.0.1:5000/secretaria/citas">Ver y Gestionar Citas</a>
    <a href="http://127.0.0.1:5000/secretaria/agendar">Agendar Cita</a>
    <a href="http://127.0.0.1:5000/secretaria/citas-reporte">Generar Reporte</a>

    <img  class="principal" src="{{url_for('static',filename='posible logo Ing aya 2026 (1).png')}}">
  </div>

  <!-- Contenido principal -->
  <div class="main">
    <!-- Perfil -->
    <div class="perfil">
      <span>Secretaria</span>
    </div>

    <!-- Imagen central -->
    <img  class="principal" src="{{url_for('static',filename='posible logo Ing aya 2026 (1).png')}}">
       
    <p>ING AYA</p>

    <!-- Mensaje animado -->
    <div id="mensaje">¡Bienvenida Secretaria!</div>

    <!-- Contenido dinámico: las plantillas hijas inyectarán aquí -->
    <div id="panel-content">
      {% block content %}{% endblock %}
    </div>
  </div>

  <script>
    // Animación de mensaje al entrar
    window.addEventListener('load', function () {
      const mensaje = document.getElementById("mensaje");
      if (!mensaje) return;
      mensaje.style.opacity = 0;
      mensaje.style.transition = "opacity 600ms ease";
      setTimeout(() => { mensaje.style.opacity = 1; }, 300);
    });

    // Función utilitaria para redirecciones programáticas (si la plantilla la necesita)
    function irA(ruta) {
      if (!ruta) return;
      window.location.href = ruta;
    }

    // Protección: si alguna vista incluye un botón con id btnReporte, no lanzar errores
    (function () {
      const btnReporte = document.getElementById("btnReporte");
      if (!btnReporte) return;
      btnReporte.addEventListener("click", function () {
        btnReporte.classList.add("loading");
        setTimeout(() => btnReporte.classList.remove("loading"), 1800);
      });
    })();
  </script>
</body>
</html>
